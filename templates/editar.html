<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Dashboard - Grupo Jota</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --surface: #111111;
            --gold: #D4AF37;
            --text: #FFFFFF;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-group {
            margin-top: 2.5rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--bg);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .section-title {
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Editar Dashboard</h1>

        <form action="/editar-dashboard" method="POST">
            <div class="form-grid">

                <h3 class="section-title">Informações Gerais</h3>
                <div class="form-group full-width">
                    <label>Mês de Referência</label>
                    <input type="text" name="mes_referencia" value="{{ dados.mes_referencia }}" required>
                </div>

                <h3 class="section-title">KPIs Principais</h3>
                <div class="form-group">
                    <label>Alcance Total</label>
                    <input type="text" name="kpi_alcance_total" value="{{ dados.kpi_alcance_total }}" required>
                </div>
                <div class="form-group">
                    <label>Visitas</label>
                    <input type="text" name="kpi_visitas" value="{{ dados.kpi_visitas }}" required>
                </div>
                <div class="form-group">
                    <label>Novos Seguidores</label>
                    <input type="text" name="kpi_novos_seg" value="{{ dados.kpi_novos_seg }}" required>
                </div>
                <div class="form-group">
                    <label>Base Atual</label>
                    <input type="text" name="kpi_base_atual" value="{{ dados.kpi_base_atual }}" required>
                </div>

                <h3 class="section-title">Engajamento</h3>
                <div class="form-group">
                    <label>Curtidas</label>
                    <input type="text" name="eng_curtidas" value="{{ dados.eng_curtidas }}" required>
                </div>
                <div class="form-group">
                    <label>Comentários</label>
                    <input type="text" name="eng_comentarios" value="{{ dados.eng_comentarios }}" required>
                </div>
                <div class="form-group">
                    <label>Compartilhamentos</label>
                    <input type="text" name="eng_compartilhamentos" value="{{ dados.eng_compartilhamentos }}" required>
                </div>
                <div class="form-group">
                    <label>Reposts</label>
                    <input type="text" name="eng_reposts" value="{{ dados.eng_reposts }}" required>
                </div>

                <h3 class="section-title">Alcance (Porcentagem %)</h3>
                <div class="form-group">
                    <label>Reels</label>
                    <input type="number" step="0.1" name="chart_reels" value="{{ dados.chart_reels }}" required>
                </div>
                <div class="form-group">
                    <label>Stories</label>
                    <input type="number" step="0.1" name="chart_stories" value="{{ dados.chart_stories }}" required>
                </div>
                <div class="form-group">
                    <label>Posts</label>
                    <input type="number" step="0.1" name="chart_posts" value="{{ dados.chart_posts }}" required>
                </div>

                <h3 class="section-title">Audiência (Porcentagem %)</h3>
                <div class="form-group">
                    <label>Não Seguidores</label>
                    <input type="number" step="0.1" name="aud_nao_seguidores" value="{{ dados.aud_nao_seguidores }}"
                        required>
                </div>
                <div class="form-group">
                    <label>Seguidores</label>
                    <input type="number" step="0.1" name="aud_seguidores" value="{{ dados.aud_seguidores }}" required>
                </div>

                <h3 class="section-title">Direcionamento Estratégico</h3>
                <div class="form-group full-width">
                    <label>Texto Estratégico (Suporta tags HTML como &lt;strong&gt;, &lt;br&gt;)</label>
                    <textarea name="insight_texto" required>{{ dados.insight_texto }}</textarea>
                </div>
            </div>

            <div class="btn-group">
                <a href="/dashboard" class="btn btn-secondary">Cancelar / Voltar</a>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>

</body>

</html>
