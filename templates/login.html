<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grupo Jota | MKT Esportivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(15, 15, 15, 0.7);
            --gold: #D4AF37;
            --gold-muted: rgba(212, 175, 55, 0.2);
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --border: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
        }

        /* Ruído de Grão Premium */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3.5rem 2.5rem;
            border-radius: 2px;
            /* Sharp edges for luxury feel */
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        .logo-box {
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInDown 0.8s ease forwards 0.3s;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.2rem;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
            font-weight: 700;
            opacity: 0;
            animation: fadeInDown 0.8s ease forwards 0.4s;
        }

        p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0;
            animation: fadeInDown 0.8s ease forwards 0.5s;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.8rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.6s;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0;
            /* Sharp edges */
            color: white;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold-muted);
        }

        #togglePassword {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }

        #togglePassword:hover {
            color: var(--gold);
        }

        button[type="submit"] {
            width: 100%;
            background: var(--gold);
            color: #000;
            border: none;
            padding: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.8s;
        }

        button[type="submit"]:hover {
            letter-spacing: 0.25em;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff6b6b;
            padding: 0.8rem;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Animations */
        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card" style="text-align: center;">
        <div class="logo-box">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Grupo Jota Logo"
                style="width: 120px; height: auto; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));">
        </div>
        <h1>Grupo Jota</h1>
        <p>Intelligence & Performance</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <label>Usuário</label>
                <div class="input-wrapper">
                    <input type="text" name="username" required autocomplete="off" placeholder="Identificador">
                </div>
            </div>
            <div class="form-group">
                <label>Senha de Acesso</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" required placeholder="••••••••">
                    <button type="button" id="togglePassword">Ver</button>
                </div>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // Alterna o tipo do input
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);

            // Alterna o texto do botão
            this.textContent = type === 'password' ? 'Ver' : 'Ocultar';
        });
    </script>
</body>

</html>
